<!doctype html>
<html class="light" lang="en">
    <head>
        <meta charset="utf-8" />
        <meta content="width=device-width, initial-scale=1.0" name="viewport" />
        <title>{% block title %}AI Assistant Dashboard{% endblock %}</title>
        <link href="/static/style.css" rel="stylesheet" />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
            rel="stylesheet"
        />
        <style>
            body {
                font-family: "Inter", sans-serif;
                background: #f3f6fd;
            }
        </style>
    </head>
    <body class="h-screen overflow-hidden">
        <div
            class="h-screen w-full overflow-hidden rounded-none border border-gray-100 bg-white shadow-sm"
        >
            <div class="flex h-full">
                <aside
                    class="h-full w-[88px] shrink-0 border-r border-gray-100 bg-white px-3 py-6 flex flex-col items-center"
                >
                <div class="mb-gutter mt-2">
                    <span
                        class="material-symbols-outlined font-h1 text-h1 font-bold text-primary dark:text-primary-fixed-dim"
                        style="font-variation-settings: &quot;FILL&quot; 1"
                    >
                        cruelty_free
                    </span>
                </div>
                    <nav class="flex h-full w-full flex-col items-center gap-3">
                        <a
                            href="/"
                            class="h-10 w-10 rounded-full flex items-center justify-center text-gray-500 hover:bg-gray-50 hover:text-gray-900 transition-colors"
                            title="Home"
                        >
                            <span class="material-symbols-outlined">home</span>
                        </a>
                        <a
                            href="/email"
                            class="h-10 w-10 rounded-full flex items-center justify-center text-gray-500 hover:bg-gray-50 hover:text-gray-900 transition-colors"
                            title="Email"
                        >
                            <span class="material-symbols-outlined">mail</span>
                        </a>
                        <a
                            href="/crafter"
                            class="h-10 w-10 rounded-full flex items-center justify-center text-gray-500 hover:bg-gray-50 hover:text-gray-900 transition-colors"
                            title="Crafter"
                        >
                            <span class="material-symbols-outlined">auto_awesome</span>
                        </a>
                        <a
                            href="/orders"
                            class="h-10 w-10 rounded-full flex items-center justify-center text-gray-500 hover:bg-gray-50 hover:text-gray-900 transition-colors"
                            title="Orders"
                        >
                            <span class="material-symbols-outlined">shopping_bag</span>
                        </a>
                        <a
                            href="#"
                            class="h-10 w-10 rounded-full flex items-center justify-center text-gray-400 border border-gray-200 bg-white"
                            title="Extra module placeholder"
                        >
                            <span class="material-symbols-outlined text-[18px]">view_kanban</span>
                        </a>
                        <div class="mt-auto flex flex-col items-center gap-3">
                            <a
                                href="#"
                                class="h-10 w-10 rounded-full flex items-center justify-center text-gray-500 hover:bg-gray-50 hover:text-gray-900 transition-colors"
                                title="Help"
                            >
                                <span class="material-symbols-outlined">help</span>
                            </a>
                            <a
                                href="/settings"
                                class="h-10 w-10 rounded-full flex items-center justify-center text-gray-500 hover:bg-gray-50 hover:text-gray-900 transition-colors"
                                title="Settings"
                            >
                                <span class="material-symbols-outlined">settings</span>
                            </a>
                        </div>
                    </nav>
                </aside>
                <div class="flex h-full min-w-0 flex-1 flex-col bg-slate-50/70">
                    <header
                        class="flex flex-wrap items-center justify-between gap-4 border-b border-gray-100 px-6 py-5"
                    >
                        <div>
                            <h1 class="text-3xl font-semibold text-gray-900">
                                {% block header_title %}Dashboard{% endblock %}
                            </h1>
                        </div>
                        <div class="flex items-center gap-3">
                            <div class="relative hidden md:block">
                                <span
                                    class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-[18px]"
                                    >search</span
                                >
                                <input
                                    class="w-64 rounded-full border border-gray-200 bg-white py-2 pl-9 pr-4 text-sm text-gray-700 placeholder:text-gray-400 focus:outline-none focus:ring-1 focus:ring-gray-300"
                                    placeholder="Search..."
                                    type="text"
                                />
                            </div>
                            <button
                                class="h-8 w-8 rounded-full border border-gray-200 bg-white flex items-center justify-center text-gray-500"
                            >
                                <span class="material-symbols-outlined text-[18px]">notifications</span>
                            </button>
                            <button
                                class="h-8 w-8 rounded-full border border-gray-200 bg-white flex items-center justify-center text-gray-500"
                            >
                                <span class="material-symbols-outlined text-[18px]">help</span>
                            </button>
                            <div
                                class="h-10 w-10 rounded-full border border-gray-200 bg-white flex items-center justify-center text-gray-500"
                            >
                                <span class="material-symbols-outlined">person</span>
                            </div>
                        </div>
                    </header>
                    <main class="{% block main_class %}min-h-0 flex-1 overflow-y-auto p-6{% endblock %}">{% block content %}{% endblock %}</main>
                </div>
            </div>
        </div>
        <script src="/static/app.js"></script>
        {% block scripts %}{% endblock %}
    </body>
</html>
